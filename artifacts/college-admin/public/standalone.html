<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EduAdmin Portal – College Administration System</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f0f4f8;--bg2:#fff;--side:#1e3a5f;--side2:#254b7a;--side3:#2e6db4;--stext:#b8d0f0;--acc:#2563eb;--accd:#1d4ed8;--accl:#eff6ff;--ok:#16a34a;--okl:#f0fdf4;--warn:#d97706;--warnl:#fffbeb;--err:#dc2626;--errl:#fef2f2;--tx:#1e293b;--tx2:#475569;--tx3:#94a3b8;--bd:#e2e8f0;--bd2:#cbd5e1;--sh:0 1px 3px rgba(0,0,0,.08);--sh2:0 4px 16px rgba(0,0,0,.12);--r:10px}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--tx)}
/* ── AUTH ── */
.auth-page{min-height:100vh;display:flex;background:linear-gradient(135deg,#1e3a5f,#2563eb)}
.auth-left{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;color:#fff;text-align:center}
.auth-brand-icon{font-size:72px;margin-bottom:12px;filter:drop-shadow(0 8px 16px rgba(0,0,0,.3))}
.auth-brand-name{font-size:32px;font-weight:700}
.auth-brand-sub{font-size:15px;opacity:.8;margin-top:6px}
.auth-features{margin-top:36px;display:flex;flex-direction:column;gap:14px;text-align:left}
.auth-feat{display:flex;align-items:center;gap:12px;font-size:14px;opacity:.9}
.auth-feat span:first-child{font-size:22px}
.auth-right{width:480px;background:#fff;display:flex;align-items:center;justify-content:center;padding:40px}
.auth-box{width:100%;max-width:380px}
.auth-title{font-size:26px;font-weight:700;color:var(--tx)}
.auth-sub{font-size:13px;color:var(--tx2);margin-top:4px;margin-bottom:24px}
/* role tabs */
.rtabs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);padding:4px;margin-bottom:22px}
.rtab{display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;border:none;background:transparent;border-radius:8px;cursor:pointer;font-size:10px;font-weight:700;letter-spacing:.06em;color:var(--tx2);transition:all .2s;font-family:inherit}
.rtab .ico{font-size:20px}
.rtab.on{background:var(--acc);color:#fff;box-shadow:var(--sh)}
.rtab:hover:not(.on){background:var(--bd)}
/* inputs */
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.fl{font-size:12px;font-weight:600;color:var(--tx2)}
.iw{position:relative}
.ii{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--tx3)}
.fi{width:100%;padding:10px 12px 10px 36px;border:1.5px solid var(--bd2);border-radius:8px;font-size:13px;font-family:inherit;color:var(--tx);background:#fff;outline:none;transition:border-color .2s,box-shadow .2s}
.fi.no{padding-left:12px}
.fi:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.fi.sm{padding:7px 10px;font-size:12px}
select.fi{cursor:pointer}
textarea.fi{resize:vertical;padding-top:10px}
/* buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .18s;font-family:inherit;white-space:nowrap}
.btn-p{background:var(--acc);color:#fff}.btn-p:hover{background:var(--accd)}
.btn-ok{background:var(--ok);color:#fff}.btn-ok:hover{filter:brightness(1.1)}
.btn-err{background:var(--err);color:#fff}.btn-err:hover{filter:brightness(1.1)}
.btn-out{background:transparent;color:var(--acc);border:1.5px solid var(--acc)}.btn-out:hover{background:var(--accl)}
.btn-g{background:var(--bg);color:var(--tx2);border:1px solid var(--bd2)}.btn-g:hover{background:var(--bd)}
.btn-xs{padding:5px 9px;font-size:11px;border-radius:6px}
.btn-sm{padding:7px 14px;font-size:12px}
.bfull{width:100%}
.btn:disabled{opacity:.55;cursor:not-allowed}
.sp{width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* misc auth */
.aerr{background:var(--errl);border:1px solid #fecaca;color:var(--err);border-radius:8px;padding:10px 12px;font-size:13px;margin-bottom:12px}
.asuc{background:var(--okl);border:1px solid #bbf7d0;color:var(--ok);border-radius:8px;padding:10px 12px;font-size:13px;margin-bottom:12px}
.ahint{background:var(--accl);border:1px solid #bfdbfe;color:var(--acc);border-radius:8px;padding:10px 12px;font-size:12px;margin-bottom:14px}
.alink{font-size:13px;color:var(--tx2);margin-bottom:12px;text-align:center}
.alink a{color:var(--acc);font-weight:600;cursor:pointer;text-decoration:none}
.alink a:hover{text-decoration:underline}
.alink.right{text-align:right;margin-top:-8px}
.divider{display:flex;align-items:center;gap:10px;margin:14px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--bd)}
.divider span{font-size:11px;color:var(--tx3);font-weight:500}
/* ── APP SHELL ── */
#app{display:none}.app{display:flex;height:100vh;overflow:hidden}
/* sidebar */
.sidebar{width:248px;min-width:248px;background:var(--side);display:flex;flex-direction:column;transition:width .25s,min-width .25s;overflow:hidden;z-index:100}
.sidebar.col{width:58px;min-width:58px}
.sb-head{display:flex;align-items:center;justify-content:space-between;padding:16px 12px;border-bottom:1px solid rgba(255,255,255,.1);min-height:64px}
.sb-brand{display:flex;align-items:center;gap:10px;min-width:0}
.sb-ico{font-size:28px;flex-shrink:0;filter:drop-shadow(0 4px 8px rgba(0,0,0,.3))}
.sb-name{font-size:14px;font-weight:700;color:#fff}
.sb-role{font-size:10px;font-weight:600;color:#60a5fa;text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
.sb-tog{width:26px;height:26px;background:rgba(255,255,255,.1);border:none;border-radius:6px;color:var(--stext);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.sb-tog:hover{background:rgba(255,255,255,.2);color:#fff}
.sb-body{flex:1;overflow-y:auto;padding:10px 8px;scrollbar-width:none}
.sb-body::-webkit-scrollbar{display:none}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;font-size:13px;font-weight:500;color:var(--stext);border-radius:8px;margin:1px 0;transition:all .15s;white-space:nowrap;user-select:none}
.nav-item:hover{background:var(--side2);color:#fff}
.nav-item.on{background:var(--side3);color:#fff}
.nav-item .ni{font-size:17px;flex-shrink:0;width:22px;text-align:center;filter:drop-shadow(0 2px 4px rgba(0,0,0,.3))}
.nav-item .nl{flex:1}
.nav-item .nc{font-size:10px;transition:transform .2s;color:rgba(255,255,255,.4)}
.nav-item .nc.open{transform:rotate(180deg)}
.nav-child{display:flex;align-items:center;gap:8px;padding:7px 12px 7px 30px;font-size:12px;color:rgba(184,208,240,.8);cursor:pointer;border-radius:6px;margin:1px 0;transition:all .15s;white-space:nowrap;user-select:none}
.nav-child:hover{background:var(--side2);color:#fff}
.nav-child.on{color:#93c5fd;background:rgba(37,99,235,.25)}
.nav-child .nci{font-size:13px}
.sb-foot{border-top:1px solid rgba(255,255,255,.1);padding:12px 10px;display:flex;flex-direction:column;gap:8px}
.uprofile{display:flex;align-items:center;gap:10px}
.uavatar{width:36px;height:36px;border-radius:8px;background:var(--side3);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;filter:drop-shadow(0 2px 6px rgba(0,0,0,.3))}
.uname{font-size:13px;font-weight:600;color:#fff}
.urole{font-size:10px;color:#60a5fa;text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
.logout{width:100%;padding:7px 12px;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);border-radius:8px;color:#fca5a5;cursor:pointer;font-size:13px;font-weight:500;text-align:left;transition:all .2s;font-family:inherit}
.logout:hover{background:rgba(239,68,68,.25)}
/* topbar */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:56px;background:#fff;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:0 22px;flex-shrink:0;box-shadow:var(--sh)}
.bread{font-size:15px;font-weight:600;color:var(--tx)}
.tb-right{display:flex;align-items:center;gap:10px}
/* notification bell */
.notif-wrap{position:relative}
.notif-btn{width:36px;height:36px;background:var(--bg);border:1px solid var(--bd);border-radius:8px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;position:relative;transition:all .2s}
.notif-btn:hover{background:var(--bd)}
.ndot{position:absolute;top:6px;right:6px;width:8px;height:8px;background:var(--err);border-radius:50%;border:2px solid #fff}
.ndrop{position:absolute;top:calc(100% + 8px);right:0;width:300px;background:#fff;border:1px solid var(--bd);border-radius:12px;box-shadow:var(--sh2);z-index:999;display:none}
.ndrop.open{display:block}
.ndrop-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--bd)}
.ndrop-title{font-size:13px;font-weight:700;color:var(--tx)}
.ndrop-clear{font-size:11px;color:var(--acc);cursor:pointer;font-weight:600}
.ndrop-clear:hover{text-decoration:underline}
.nitem{display:flex;gap:10px;padding:12px 14px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .15s}
.nitem:last-child{border-bottom:none}
.nitem:hover{background:var(--bg)}
.nitem.unread{background:var(--accl)}
.nitem-ico{font-size:20px;flex-shrink:0;filter:drop-shadow(0 2px 4px rgba(0,0,0,.2))}
.nitem-text{font-size:12px;color:var(--tx);flex:1}
.nitem-time{font-size:10px;color:var(--tx3);margin-top:3px}
.ndrop-empty{padding:24px;text-align:center;color:var(--tx3);font-size:13px}
/* topbar user chip */
.tb-user{display:flex;align-items:center;gap:8px;padding:6px 12px;background:var(--accl);border:1px solid #bfdbfe;border-radius:8px;font-size:13px;font-weight:600;color:var(--acc)}
/* page */
.page-wrap{flex:1;overflow-y:auto;padding:22px;background:var(--bg)}
.page{display:flex;flex-direction:column;gap:18px}
.ph{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.pt{font-size:21px;font-weight:700;color:var(--tx)}
.ps{font-size:13px;color:var(--tx2);margin-top:2px}
/* stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px}
.sc{background:#fff;border-radius:12px;padding:16px;display:flex;align-items:center;gap:14px;border:1px solid var(--bd);box-shadow:var(--sh)}
.sico{width:46px;height:46px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;filter:drop-shadow(0 4px 8px rgba(0,0,0,.15))}
.sv{font-size:24px;font-weight:700;color:var(--tx)}
.sl{font-size:11px;color:var(--tx2);margin-top:2px}
.sch{font-size:11px;color:var(--ok);margin-top:3px}
/* cards */
.card{background:#fff;border:1px solid var(--bd);border-radius:12px;overflow:hidden;box-shadow:var(--sh)}
.ch{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;padding:14px 18px;border-bottom:1px solid var(--bd)}
.ct{font-size:13px;font-weight:600;color:var(--tx)}
.cb{padding:16px 18px}
.cb.p0{padding:0}
/* grid */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:900px){.g2{grid-template-columns:1fr}}
/* table */
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{text-align:left;padding:10px 14px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--tx2);background:var(--bg);border-bottom:1px solid var(--bd);white-space:nowrap}
td{padding:10px 14px;border-bottom:1px solid var(--bd);color:var(--tx)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafbfc}
.tm{font-weight:500}
.ts{color:var(--tx2)}
/* badges */
.badge{display:inline-block;padding:3px 8px;background:var(--bg);border-radius:5px;font-size:11px;font-weight:500;color:var(--tx2);border:1px solid var(--bd);white-space:nowrap}
.badge.a{background:var(--accl);color:var(--acc);border-color:#bfdbfe}
.badge.g{background:var(--okl);color:var(--ok);border-color:#bbf7d0}
.sbadge{display:inline-block;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:600}
.sbadge.pending{background:var(--warnl);color:var(--warn)}
.sbadge.approved{background:var(--okl);color:var(--ok)}
.sbadge.rejected{background:var(--errl);color:var(--err)}
.abts{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
/* filter row */
.frow{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
/* mini stats */
.mstats{display:flex;gap:10px;flex-wrap:wrap}
.ms{flex:1;min-width:90px;background:#fff;border:1px solid var(--bd);border-radius:10px;padding:14px;text-align:center;box-shadow:var(--sh)}
.ms.pending{border-top:3px solid var(--warn)}
.ms.approved{border-top:3px solid var(--ok)}
.ms.rejected{border-top:3px solid var(--err)}
.msv{font-size:26px;font-weight:700;color:var(--tx)}
.msl{font-size:11px;color:var(--tx2);text-transform:capitalize;margin-top:3px}
/* prediction */
.pred{margin-top:10px;padding:12px;border-radius:8px;font-size:14px;font-weight:500}
.pred.risk{background:var(--errl);border:1px solid #fecaca;color:var(--err)}
.pred.excellent{background:var(--okl);border:1px solid #bbf7d0;color:var(--ok)}
.pred.average{background:var(--warnl);border:1px solid #fed7aa;color:var(--warn)}
/* scholarship info */
.sch-info{background:#fff;border:1px solid var(--bd);border-radius:12px;padding:18px;display:flex;flex-direction:column;gap:12px;box-shadow:var(--sh)}
.ii2{display:flex;align-items:flex-start;gap:10px}
.ii2ico{font-size:20px;flex-shrink:0;margin-top:2px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.2))}
.iil{font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em}
.iiv{font-size:13px;color:var(--tx2);margin-top:3px}
.iiv.hi{color:var(--ok);font-weight:700;font-size:15px}
/* user card */
.ucard{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--bd);transition:background .15s}
.ucard:hover{background:var(--bg)}
.ucard:last-child{border-bottom:none}
.uca{width:40px;height:40px;border-radius:10px;background:var(--accl);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;filter:drop-shadow(0 2px 6px rgba(0,0,0,.15))}
.ucn{font-size:13px;font-weight:600;color:var(--tx)}
.ucr{font-size:12px;color:var(--tx2);margin-top:2px}
/* toggle */
.toggle{position:relative;width:40px;height:20px;cursor:pointer;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.ts2{position:absolute;inset:0;background:var(--bd2);border-radius:100px;transition:background .2s}
.ts2::after{content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;background:#fff;border-radius:50%;transition:transform .2s}
.toggle input:checked+.ts2{background:var(--acc)}
.toggle input:checked+.ts2::after{transform:translateX(20px)}
/* pref item */
.pi{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--bd)}
.pi:last-child{border-bottom:none}
.pil{font-size:13px;font-weight:500;color:var(--tx)}
.pid{font-size:12px;color:var(--tx2);margin-top:2px}
/* timetable */
.ttcell{background:var(--accl);font-weight:600;font-size:11px;text-align:center;color:var(--acc);border-radius:4px;padding:6px 4px}
.ttcell.lunch{background:var(--okl);color:var(--ok)}
/* modal */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:2000;backdrop-filter:blur(2px)}
.mbox{background:#fff;border-radius:14px;padding:26px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.mhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.mtitle{font-size:17px;font-weight:700;color:var(--tx)}
.mclose{width:28px;height:28px;background:var(--bg);border:1px solid var(--bd);border-radius:6px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--tx2)}
.mclose:hover{background:var(--bd)}
.mfoot{display:flex;justify-content:flex-end;gap:10px;margin-top:18px;padding-top:14px;border-top:1px solid var(--bd)}
.frow2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
/* alert */
.alt{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:10px}
.alt-ok{background:var(--okl);border:1px solid #bbf7d0;color:var(--ok)}
.alt-info{background:var(--accl);border:1px solid #bfdbfe;color:var(--acc)}
/* empty */
.empty{text-align:center;padding:32px;color:var(--tx3);font-size:13px}
/* role access badge */
.role-tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.04em}
.rt-admin{background:#fdf2ff;color:#9333ea;border:1px solid #e9d5ff}
.rt-hod{background:var(--okl);color:var(--ok);border:1px solid #bbf7d0}
.rt-staff{background:var(--accl);color:var(--acc);border:1px solid #bfdbfe}
</style>
</head>
<body>

<!-- ═══════════ AUTH SCREEN ═══════════ -->
<div id="authPage" class="auth-page">
  <div class="auth-left">
    <div class="auth-brand-icon">🏛️</div>
    <div class="auth-brand-name">EduAdmin Portal</div>
    <div class="auth-brand-sub">College Administration System</div>
    <div class="auth-features">
      <div class="auth-feat"><span>🎓</span><span>Role-Based Secure Access</span></div>
      <div class="auth-feat"><span>📋</span><span>Leave &amp; Certificate Approvals</span></div>
      <div class="auth-feat"><span>📁</span><span>Document Management</span></div>
      <div class="auth-feat"><span>🏆</span><span>Scholarship Module</span></div>
      <div class="auth-feat"><span>📊</span><span>Examination Management</span></div>
    </div>
  </div>
  <div class="auth-right">
    <div class="auth-box" id="authBox"></div>
  </div>
</div>

<!-- ═══════════ MAIN APP ═══════════ -->
<div id="app" class="app">
  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sb-head">
      <div class="sb-brand" id="sbBrand">
        <span class="sb-ico">🏛️</span>
        <div><div class="sb-name">EduAdmin</div><div class="sb-role" id="sbRole"></div></div>
      </div>
      <button class="sb-tog" onclick="toggleSidebar()">◀</button>
    </div>
    <div class="sb-body" id="sbNav"></div>
    <div class="sb-foot">
      <div class="uprofile">
        <div class="uavatar" id="uAvatar"></div>
        <div id="uInfo" style="min-width:0">
          <div class="uname" id="uName"></div>
          <div class="urole" id="uRole"></div>
        </div>
      </div>
      <button class="logout" onclick="logout()">🚪 Logout</button>
    </div>
  </div>
  <!-- MAIN -->
  <main class="main">
    <div class="topbar">
      <div class="bread" id="breadcrumb">Dashboard</div>
      <div class="tb-right">
        <div class="notif-wrap">
          <button class="notif-btn" onclick="toggleNotif()" id="notifBtn">
            🔔<span class="ndot" id="ndot"></span>
          </button>
          <div class="ndrop" id="ndrop">
            <div class="ndrop-head">
              <span class="ndrop-title">Notifications</span>
              <span class="ndrop-clear" onclick="clearNotifs()">Clear All</span>
            </div>
            <div id="nlist"></div>
          </div>
        </div>
        <div class="tb-user"><span id="tbIcon"></span><span id="tbName"></span></div>
      </div>
    </div>
    <div class="page-wrap" id="pageWrap"></div>
  </main>
</div>

<!-- ═══════════ MODAL ═══════════ -->
<div class="mo" id="modal" style="display:none" onclick="closeModal(event)">
  <div class="mbox" id="mbox" onclick="event.stopPropagation()">
    <div class="mhead">
      <span class="mtitle" id="mtitle"></span>
      <button class="mclose" onclick="closeModal()">✕</button>
    </div>
    <div id="mbody"></div>
    <div class="mfoot" id="mfoot"></div>

function gotoScreen(s){ S.authScreen=s; S.authError=''; S.success=''; renderAuth(); }

function doLogin(e){
  e.preventDefault();
  const email=document.getElementById('lemail').value;
  const pwd=document.getElementById('lpwd').value;
  const acc=S.accounts.find(a=>a.email===email&&a.password===pwd&&a.role===S.authRole);
  if(acc){ S.auth={name:acc.name,email:acc.email,role:acc.role}; S.authError=''; S.success=''; S.page='dashboard'; render(); }
  else { S.authError='Invalid credentials. Use the hint above.'; renderAuth(); }
}

function doSignup(e){
  e.preventDefault();
  const name=document.getElementById('sname').value;
  const email=document.getElementById('semail').value;
  const pwd=document.getElementById('spwd').value;
  const pwd2=document.getElementById('spwd2').value;
  if(pwd!==pwd2){S.authError='Passwords do not match.';renderAuth();return;}
  if(pwd.length<6){S.authError='Password must be at least 6 characters.';renderAuth();return;}
  if(S.accounts.find(a=>a.email===email)){S.authError='Email already registered.';renderAuth();return;}
  S.accounts.push({name,email,password:pwd,role:S.authRole});
  S.success='Account created! You can now sign in.'; S.authError='';
  S.authScreen='login'; renderAuth();
}

function doForgot(e){
  e.preventDefault();
  const email=document.getElementById('femail').value;
  const acc=S.accounts.find(a=>a.email===email);
  if(acc){S.success=`Reset link sent! (Demo: your password is "${acc.password}")`;}
  else{S.authError='No account found with this email.';}
  S.authError=acc?'':'No account found with this email.';
  renderAuth();
}

function genPwd(){
  const chars='abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$!';
  let p='';for(let i=0;i<12;i++)p+=chars[Math.floor(Math.random()*chars.length)];
  const s=document.getElementById('spwd'); const s2=document.getElementById('spwd2');
  if(s){s.value=p;s.type='text';setTimeout(()=>{s.type='password'},2000);}
  if(s2)s2.value=p;
}

  document.getElementById('tbName').textContent=S.auth?.name||'';

  let html=`<div class="nav-item ${S.page==='dashboard'?'on':''}" onclick="goto('dashboard')">
    <span class="ni">📊</span>${!col?'<span class="nl">Dashboard</span>':''}
  </div>`;

  for(const grp of NAV_CONFIG){
    const hasChildren=grp.children&&grp.children.length>0;
    // Check if any child is accessible
    let accessible=false;
    if(!hasChildren){
      accessible=canAccess(grp.page||grp.key);
    } else {
      accessible=grp.children.some(c=>canAccess(c.page));
    }
    if(!accessible) continue;

    if(!hasChildren){
      html+=`<div class="nav-item ${S.page===grp.page?'on':''}" onclick="goto('${grp.page}')">
        <span class="ni">${grp.icon}</span>${!col?`<span class="nl">${grp.label}</span>`:''}

        ${!col?`<span class="nl">${grp.label}</span><span class="nc ${open?'open':''}">▾</span>`:''}

      if(!col&&open){
        for(const c of grp.children){
          if(!canAccess(c.page)) continue;
          html+=`<div class="nav-child ${S.page===c.page?'on':''}" onclick="goto('${c.page}')">
            <span class="nci">${c.icon}</span><span>${c.label}</span>
          </div>`;
        }
      }
    }
  }
  document.getElementById('sbNav').innerHTML=html;
}

function predict(){
  const marks=document.getElementById('dmk').value.split(',').map(m=>parseFloat(m)).filter(n=>!isNaN(n));
  const att=parseFloat(document.getElementById('datt').value)||0;
  if(!marks.length)return;
  const avg=marks.reduce((s,x)=>s+x,0)/marks.length;
  let cls,txt;
  if(avg<60||att<75){cls='risk';txt='At Risk — Student needs academic counseling.';}
  else if(avg>=80&&att>=85){cls='excellent';txt='Excellent — Student is performing exceptionally!';}
  else{cls='average';txt='Average — Student is on track. Keep monitoring.';}
  document.getElementById('predResult').innerHTML=`<div class="pred ${cls}" style="margin-top:10px"><strong>Result:</strong> ${txt}</div>`;
}

function dashLeaveAction(id,status){
  const l=S.leaves.find(l=>l.id===id); if(l)l.status=status;
  document.getElementById('dleaves').innerHTML=renderDashLeaves();
  addNotif('📋',`Leave ${status} for ${l?.name}`);
}

        <td class="ts">${i+1}</td><td class="tm">${e.subject}</td>
        <td><span class="badge a">${e.dept}</span></td>
        <td class="ts">${e.sem}</td><td class="ts">${e.date}</td><td class="ts">${e.time}</td>
        <td class="ts">${e.hall}</td><td class="ts">${e.students}</td>
        <td><div class="abts">
          ${isAdmin?`<button class="btn btn-xs btn-g" onclick="openExamModal(${e.id})">✏️ Edit</button>`:''}
          <button class="btn btn-xs btn-p" onclick="dlFile('${e.subject}.txt','Exam: ${e.subject}\\nDept: ${e.dept}\\nDate: ${e.date}\\nHall: ${e.hall}')">⬇️ Export</button>
          ${isAdmin?`<button class="btn btn-xs btn-err" onclick="deleteExam(${e.id})">🗑️</button>`:''}
        </div></td>
      </tr>`).join('')}
      </tbody>
    </table>
  </div></div></div>`;
}

function openExamModal(id){
  const e=id?S.exams.find(e=>e.id===id):null;
  openModal(e?'Edit Exam':'Schedule Exam',`
    <div class="fg"><label class="fl">Subject Name</label><input class="fi no" id="esn" value="${e?.subject||''}" placeholder="e.g. Data Structures"/></div>
    <div class="frow2">
      <div class="fg"><label class="fl">Department</label>
        <select class="fi no" id="esdp">${DEPTS.map(d=>`<option ${e?.dept===d?'selected':''}>${d}</option>`).join('')}</select></div>
      <div class="fg"><label class="fl">Semester</label>
        <select class="fi no" id="ess">${SEMS.map(s=>`<option ${e?.sem===s?'selected':''}>${s}</option>`).join('')}</select></div>
    </div>
    <div class="frow2">
      <div class="fg"><label class="fl">Date</label><input type="date" class="fi no" id="esd" value="${e?.date||''}"/></div>
      <div class="fg"><label class="fl">Time</label><input class="fi no" id="est" value="${e?.time||'9:00 AM'}" placeholder="9:00 AM"/></div>
    </div>
    <div class="frow2">
      <div class="fg"><label class="fl">Hall No.</label><input class="fi no" id="esh" value="${e?.hall||''}" placeholder="e.g. A101"/></div>
      <div class="fg"><label class="fl">No. of Students</label><input type="number" class="fi no" id="esst" value="${e?.students||60}"/></div>
    </div>`,
    ()=>{
      const subject=document.getElementById('esn').value;
      if(!subject)return;
      const obj={subject,dept:document.getElementById('esdp').value,sem:document.getElementById('ess').value,date:document.getElementById('esd').value,time:document.getElementById('est').value,hall:document.getElementById('esh').value,students:parseInt(document.getElementById('esst').value)||60};
      if(e){Object.assign(e,obj);}else{S.exams.push({id:Date.now(),...obj}); addNotif('📊',`Exam scheduled: ${subject}`);}
      closeModal(); renderPage();
    });
}
function deleteExam(id){ S.exams=S.exams.filter(e=>e.id!==id); renderPage(); }

// ── SETTINGS ──────────────────────────────────────────
function pageSettings(){
  const st=S.settings;
  return `<div class="page">
  <div class="ph"><div class="pt">⚙️ Settings</div></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <div class="card">
      <div class="ch"><span class="ct">🏛️ College Information</span></div>
      <div class="cb">
        <div class="fg"><label class="fl">College Name</label><input class="fi no" id="stn" value="${st.college}" /></div>
        <div class="fg"><label class="fl">Admin Email</label><input type="email" class="fi no" id="ste" value="${st.email}" /></div>
        <div class="fg"><label class="fl">Phone</label><input class="fi no" id="stp" value="${st.phone}" /></div>
        <button class="btn btn-p" onclick="saveSettings()">💾 Save Changes</button>
      </div>
    </div>
    <div class="card">
      <div class="ch"><span class="ct">🔔 Preferences</span></div>
      <div class="cb">
        ${[
          {key:'notifs',label:'Push Notifications',desc:'Alerts for leave and approvals'},
          {key:'emails',label:'Email Alerts',desc:'Updates via email'},
          {key:'auto',label:'Auto-Approve Leaves',desc:'Auto-approve standard leaves'},
        ].map(p=>`<div class="pi">
          <div><div class="pil">${p.label}</div><div class="pid">${p.desc}</div></div>
          <label class="toggle"><input type="checkbox" ${st[p.key]?'checked':''} onchange="S.settings.${p.key}=this.checked"/><span class="ts2"></span></label>
        </div>`).join('')}
      </div>
    </div>
  </div></div>`;
}

function saveSettings(){
  S.settings.college=document.getElementById('stn').value;
  S.settings.email=document.getElementById('ste').value;
  S.settings.phone=document.getElementById('stp').value;
  addNotif('⚙️','Settings saved successfully!');
  alert('✅ Settings saved!');
}

// ══════════════════════════════════════════════════════
//  MODAL SYSTEM
// ══════════════════════════════════════════════════════
let _modalSave=null;
function openModal(title,body,onSave){
  _modalSave=onSave;
  document.getElementById('mtitle').textContent=title;
  document.getElementById('mbody').innerHTML=body;
  document.getElementById('mfoot').innerHTML=`
    <button class="btn btn-g" onclick="closeModal()">Cancel</button>
    <button class="btn btn-p" onclick="_modalSave&&_modalSave()">Save</button>`;
  document.getElementById('modal').style.display='flex';
}
function closeModal(e){
  if(e&&e.target!==document.getElementById('modal'))return;
  document.getElementById('modal').style.display='none';
}

// ══════════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════════
function dlFile(name,content){
  const b=new Blob([content],{type:'text/plain'});
  const u=URL.createObjectURL(b);
  const a=document.createElement('a');
  a.href=u;a.download=name;a.click();
  URL.revokeObjectURL(u);
}

function today(){
  const d=new Date();
  return d.toISOString().slice(0,10);
}

function addNotif(icon,text){
  S.notifications.unshift({id:Date.now(),icon,text,time:'Just now',read:false});
  if(S.notifications.length>10)S.notifications=S.notifications.slice(0,10);
  renderNotifs();
}

function showAlert(title,msg,type){
  alert(`${title}\n${msg}`);
}

// ══════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════
render();
</script>
</body>
</html>
