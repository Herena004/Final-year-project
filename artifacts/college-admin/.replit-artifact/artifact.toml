kind = "web"
previewPath = "/"
title = "College Administration System"
version = "1.0.0"
id = "artifacts/college-admin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20388

[services.development]
run = "pnpm --filter @workspace/college-admin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/college-admin", "run", "build" ]
publicDir = "artifacts/college-admin/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20388"
BASE_PATH = "/"
